name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests (deterministic pipeline, no API key needed)
        run: pytest tests/ -v

      - name: Smoke-test CLI (--no-llm mode)
        run: |
          python src/data/generate_sample_data.py
          python src/main.py --csv data/sample_business_metrics.csv --periods 7 --no-llm
