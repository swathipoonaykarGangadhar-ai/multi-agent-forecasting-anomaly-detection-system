# Optional: runs the FULL agent crew (costs LLM API credits) and commits the
# resulting report + charts back to the repo. Manual trigger only by default —
# uncomment the `schedule` block below if you want it to run automatically
# (e.g. daily), but be aware that costs real API credits every run.
name: Run Forecast Report

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 6 * * 1"   # every Monday 06:00 UTC

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate sample data (skip this step if using your own CSV committed to the repo)
        run: python src/data/generate_sample_data.py

      - name: Run full agent crew
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: anthropic/claude-sonnet-4-6
        run: python src/main.py --csv data/sample_business_metrics.csv --periods 14

      - name: Commit updated report & charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --staged --quiet || git commit -m "chore: update forecast report [automated]"
          git push
